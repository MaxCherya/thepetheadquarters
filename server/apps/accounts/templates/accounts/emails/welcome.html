<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background:#F4F1EA;font-family:Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="max-width:600px;margin:40px auto;background:#FFFFFF;border-radius:4px;border:1px solid #DED9CF;">
    <tr>
      <td style="padding:40px 32px;text-align:center;">
        <h1 style="margin:0 0 8px;font-size:24px;font-weight:300;color:#111111;">{{ site_name }}</h1>
        <p style="margin:0;font-size:14px;color:#666666;">Welcome aboard</p>
      </td>
    </tr>
    <tr>
      <td style="padding:0 32px 32px;">
        <p style="font-size:15px;line-height:1.6;color:#333333;">Hello {{ user.first_name }},</p>
        <p style="font-size:15px;line-height:1.6;color:#333333;">Your email has been verified successfully. You now have full access to your account.</p>
        <table width="100%" cellpadding="0" cellspacing="0">
          <tr>
            <td style="padding:24px 0;text-align:center;">
              <a href="{{ shop_url }}" style="display:inline-block;padding:14px 32px;background:#C6A030;color:#FFFFFF;text-decoration:none;font-size:14px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;border-radius:4px;">Browse Products</a>
            </td>
          </tr>
        </table>
      </td>
    </tr>
    <tr>
      <td style="padding:24px 32px;border-top:1px solid #DED9CF;text-align:center;">
        <p style="margin:0;font-size:12px;color:#999999;">&copy; {{ site_name }}</p>
      </td>
    </tr>
  </table>
</body>
</html>
